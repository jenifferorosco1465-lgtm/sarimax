primary_paper:
  title: "Time Series Analysis for Predicting Hydroelectric Power Production: The Ecuador Case"
  authors:
    - Javier Barzola-Monteses
    - Manuel Martínez-López
    - María Espinoza-Andaluz
    - Juan Gómez-Romero
    - W. Fajardo
  year: 2019
  journal: Sustainability
  volume: 11
  issue: 23
  article: 6539
  doi: "10.3390/su11236539"
